<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Squid Game UI</title>

  <link rel="stylesheet" href="style.css">

  <link
    href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css"
    rel="stylesheet"
  >

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >
</head>

<body>

  <div class="main">


    <nav>

      <h2 class="logo">SQUID <span>GAME</span></h2>

      <div class="nav-links">
        <a href="#">About</a>
        <a class="active" href="#">Watch now</a>
        <a href="#">Actors</a>
        <a href="#">Contact</a>
      </div>

      <i class="ri-menu-line menu"></i>

    </nav>


    <div class="hero">


      <div class="left">

        <h1>
          SQUID <br>
          GAME
        </h1>

        <p>
          Action / Thriller / Drama Series directed
          by Dong-hyuk Hwang
          <br>
          Season 1: 9 Episodes
        </p>


        <div class="buttons">

          <button class="play-btn">
            <i class="ri-play-circle-fill"></i>
            Play Now
          </button>

          <button class="trailer-btn">
            <i class="ri-play-mini-line"></i>
            Watch Trailer
          </button>

        </div>

      </div>


      <div class="right">

        <img
          src="https://images5.alphacoders.com/118/thumb-1920-1188416.jpg"
        >

      </div>

    </div>


    <div class="socials">
      <i class="ri-twitter-line"></i>
      <i class="ri-instagram-line"></i>
      <i class="ri-facebook-line"></i>
    </div>



    <div class="scroll">
      <p>SCROLL</p>
      <div class="scroll-line"></div>
    </div>


    <h1 class="bg-text">GAME</h1>


    <div class="cards">

      <div class="card">
        <img
          src="https://images6.alphacoders.com/119/thumb-1920-1191374.jpg"
          alt=""
        >
        <i class="ri-play-circle-fill"></i>
      </div>

      <div class="card">
        <img
          src="https://images3.alphacoders.com/117/thumb-1920-1177226.jpg"
          alt=""
        >
        <i class="ri-play-circle-fill"></i>
      </div>

      <div class="card">
        <img
          src="https://images3.alphacoders.com/117/thumb-1920-1179580.png"
          alt=""
        >
        <i class="ri-play-circle-fill"></i>
      </div>

    </div>

  </div>

</body>
</html>
