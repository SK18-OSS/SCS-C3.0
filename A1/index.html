<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pikachu UI</title>

  <link rel="stylesheet" href="style.css">


  <link
    href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css"
    rel="stylesheet"
  />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700;900&display=swap"
    rel="stylesheet"
  >
</head>

<body>

  <div class="main">


    <div class="left">

      <img
        class="logo"
        src="https://upload.wikimedia.org/wikipedia/commons/9/98/International_Pok%C3%A9mon_logo.svg?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=original"
        alt="Pokemon Logo"
      >

      <div class="content">

        <h5>POKEMON GEN I</h5>

        <h1>Pikachu</h1>

        <p>
          Pikachu is an Electric-type Pokémon introduced
          in Generation I. Pikachu are small, chubby,
          and incredibly cute mouse-like Pokémon.
          They are almost completely covered by
          yellow fur.
        </p>

        <div class="page">
          <div class="line"></div>
          <h4>01 / 08</h4>
        </div>

      </div>

      <img
        class="pokeball"
        src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png"
        alt="Pokeball"
      >

    </div>


    <div class="right">

      <div class="menu">
        <i class="ri-menu-line"></i>
      </div>

      <div class="dots">
        <div class="dot black"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

    </div>


    <img
      class="pikachu"
      src="https://assets.pokemon.com/assets/cms2/img/pokedex/full/025.png"
      alt="Pikachu"
    >

  </div>

</body>
</html>
